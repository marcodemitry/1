<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarry Calculator Pro</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  direction: rtl;
  background: linear-gradient(to right, #0f172a, #1e293b);
  color: white;
}

h2, h3 { text-align: center; }

input, select, button {
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

input, select {
  background: #f1f5f9;
  color: black;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.card {
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
}

.result {
  margin-top: 10px;
  color: #38bdf8;
  font-weight: bold;
}

.summary {
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>📊 حاسبة المحاجر PRO</h2>

<!-- التكشيف -->
<div class="card">
<h3>التكشيف</h3>
<input id="area" placeholder="المساحة">
<input id="depth" placeholder="العمق (سم)">
<input id="density" placeholder="الكثافة (افتراضي 1.5)">
<button onclick="calcTonnage()">احسب</button>
<p id="tonnage" class="result"></p>
</div>

<!-- العروق -->
<div class="card">
<h3>العروق والشوائب</h3>
<input id="veinLength" placeholder="الطول (م)">
<input id="veinThickness" placeholder="السمك (م)">
<input id="veinDepth" placeholder="العمق (م)">
<select id="shapeFactor">
<option value="1">منتظم</option>
<option value="0.7">شبه منتظم</option>
<option value="0.5" selected>غير منتظم</option>
</select>
<input id="veinDensity" placeholder="الكثافة (افتراضي 2.2)">
<button onclick="calcVein()">احسب</button>
<p id="veinResult" class="result"></p>
</div>

<!-- التقرير -->
<div class="card">
<h3>📅 تقرير اليوم</h3>

<input id="dailyProduction" placeholder="الإنتاج (طن)">
<input id="dailyWaste" placeholder="الشوائب (طن)">
<input id="dailyPile" placeholder="المشون (طن)">
<input id="contractPrice" placeholder="سعر الطن (افتراضي 42.5)">
<input id="dailyNotes" placeholder="ملاحظات">

<button onclick="saveReport()">💾 حفظ</button>
<button onclick="showReports()">📊 عرض</button>
<button onclick="downloadPDF()">📄 PDF</button>

<div id="summary" class="summary"></div>
<p id="reportOutput"></p>
</div>

<script>
function calcTonnage(){
let a=area.value||0,d=depth.value||0,den=density.value||1.5;
let res=a*(d/100)*den;
tonnage.innerHTML="الناتج: "+res.toFixed(2)+" طن";
}

function calcVein(){
let l=veinLength.value||0,t=veinThickness.value||0,dep=veinDepth.value||0;
let f=shapeFactor.value,d=veinDensity.value||2.2;
let vol=l*t*dep*f,tons=vol*d;
veinResult.innerHTML="الحجم: "+vol.toFixed(2)+" م³ | الوزن: "+tons.toFixed(2)+" طن";
}

function saveReport(){
let prod=+dailyProduction.value||0;
let waste=+dailyWaste.value||0;
let pile=+dailyPile.value||0;
let price=+contractPrice.value||42.5;
let notes=dailyNotes.value;

let net=prod-waste;
let percent=prod?(waste/prod*100):0;
let cost=prod*price;

let report={
date:new Date().toLocaleDateString(),
prod,waste,pile,net,
percent:percent.toFixed(2),
cost:cost.toFixed(2),
notes
};

let arr=JSON.parse(localStorage.getItem("reports"))||[];
arr.push(report);
localStorage.setItem("reports",JSON.stringify(arr));

alert("تم الحفظ");
}

function showReports(){
let arr=JSON.parse(localStorage.getItem("reports"))||[];
let out="",totalP=0,totalW=0,totalC=0;

arr.forEach(r=>{
totalP+=r.prod;
totalW+=r.waste;
totalC+=+r.cost;

out+=`
📅 ${r.date}<br>
الإنتاج: ${r.prod} طن<br>
الشوائب: ${r.waste} طن<br>
الصافي: ${r.net} طن<br>
النسبة: ${r.percent}%<br>
التكلفة: ${r.cost} جنيه<br>
<hr>`;
});

summary.innerHTML=`
الإجمالي: ${totalP} طن<br>
الشوائب: ${totalW} طن<br>
التكلفة: ${totalC.toFixed(2)} جنيه
`;

reportOutput.innerHTML=out||"لا يوجد بيانات";
}

function downloadPDF(){
let text=reportOutput.innerText;
let blob=new Blob([text],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.txt";
a.click();
}
</script>

</body>
</html>
