<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarry Calculator</title>
</head>
<body>
    <h1>Quarry Calculator</h1>
    <p>Use this calculator to determine the volume of quarry materials needed for your projects.</p>
    <form>
        <label for="length">Length (m):</label>
        <input type="number" id="length" required><br>

        <label for="width">Width (m):</label>
        <input type="number" id="width" required><br>

        <label for="depth">Depth (m):</label>
        <input type="number" id="depth" required><br>

        <button type="button" onclick="calculateVolume()">Calculate Volume</button>
    </form>

    <h2 id="result"></h2>

    <script>
        function calculateVolume() {
            const length = document.getElementById('length').value;
            const width = document.getElementById('width').value;
            const depth = document.getElementById('depth').value;

            const volume = length * width * depth;
            document.getElementById('result').innerText = `Volume: ${volume} cubic meters`;
        }
    </script>
</body>
</html>
